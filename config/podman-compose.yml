# Project Alexandria — Podman Compose
# ─────────────────────────────────────────────────────────────────────────────
# Compliance: DISA STIG, CIS Level 2, FIPS 140-3, NIST SP 800-53
# Run as rootless Podman (UID 100000+).
# Secrets: inject WEBUI_SECRET_KEY via `podman secret` before first run.
#
# ZIM Acquisition: sneakernet only — run scripts/sneakernet.sh to import ZIM
# from a FIPS 140-3 encrypted USB populated by the external staging server.
#
# Setup:
#   podman secret create webui_secret_key <(echo "YOUR_KEY")
#   podman-compose --env-file .env up -d

version: "3.9"

# ── Named volumes (rootless, Z-labelled for SELinux) ──────────────────────────
volumes:
  zim-data:
    driver: local
    driver_opts:
      type: none
      o: bind,ro
      device: ${ZIM_PATH}
  edits-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${EDITS_PATH}
  ollama-data:
    driver: local
  chromadb-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CHROMA_DATA_PATH}

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
    internal: true          # no host-outbound access; ZIM delivered via sneakernet
  ai-backend:
    driver: bridge
    internal: true

# ═════════════════════════════════════════════════════════════════════════════
# Services
# ═════════════════════════════════════════════════════════════════════════════

services:

  # ── 1. Kiwix (Wikipedia mirror reader) ─────────────────────────────────────
  kiwix:
    build:
      context: ../services/kiwix
      dockerfile: Containerfile
    container_name: alexandria-wiki
    restart: unless-stopped
    command: /data/zim/${ZIM_FILE}
    volumes:
      - zim-data:/data/zim:ro,Z
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
      - label=type:container_runtime_t
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    mem_limit: 512m
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/catalog/root.xml"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── 2. ChromaDB (vector store for RAG) ──────────────────────────────────────
  chromadb:
    build:
      context: ../services/chromadb
      dockerfile: Containerfile
    container_name: alexandria-chroma
    restart: unless-stopped
    environment:
      - CHROMA_DB_IMPL=duckdb+parquet
      - PERSIST_DIRECTORY=/data/chromadb
      - ANONYMIZED_TELEMETRY=false
    volumes:
      - chromadb-data:/data/chromadb:Z
    networks:
      - ai-backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    cpus: "2.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── 3. Ollama (LLM inference engine) ────────────────────────────────────────
  ollama:
    build:
      context: ../services/ollama
      dockerfile: Containerfile
    container_name: alexandria-ollama
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama-data:/root/.ollama:Z
    networks:
      - ai-backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 16g
    cpus: "4.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:11434/api/tags"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s

  # ── 4. Open WebUI (orchestration + user interface) ───────────────────────────
  openwebui:
    build:
      context: ../services/openwebui
      dockerfile: Containerfile
    container_name: alexandria-webui
    restart: unless-stopped
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_HTTP_HOST=chromadb
      - CHROMA_HTTP_PORT=${CHROMA_PORT}
      - WEBUI_SECRET_KEY=/run/secrets/webui_secret_key
    secrets:
      - webui_secret_key
    volumes:
      - edits-data:/data/edits:ro,Z
    ports:
      - "127.0.0.1:${WEBUI_PORT}:8080"    # bind localhost only; expose via reverse proxy
    networks:
      - internal
      - ai-backend
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      kiwix:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1g
    cpus: "2.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

# ── Podman secrets (created externally before first run) ─────────────────────
secrets:
  webui_secret_key:
    external: true
